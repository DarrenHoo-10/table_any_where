<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbfcfa">
    <meta
      name="description"
      content="Table Any Where，让朋友不用下载，发个房间号就能一起打牌。"
    >
    <title>Table Any Where · 朋友开局，就差你了</title>
    <link rel="icon" href="./site-icon-v2.png" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">
    <link
      rel="preload"
      href="./design-assets/home-hero-friends-v1.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
    >
    <link rel="stylesheet" href="./lobby.css">
    <script src="./lobby.js" defer></script>
  </head>
  <body data-page="home">
    <div class="lobby-shell">
      <header class="site-header">
        <a class="brand" href="./" aria-label="Table Any Where 首页">
          <img class="brand-mark" src="./site-icon-v2.png" alt="" aria-hidden="true">
          <span class="brand-name">Table Any Where</span>
        </a>

        <nav id="mainNav" class="main-nav" aria-label="主导航">
          <a href="./" aria-current="page">首页</a>
          <a href="#play">一起玩</a>
          <a href="#rooms">我的房间</a>
        </nav>

        <div class="header-actions">
          <a class="resume-link" href="./games/zha-jin-hua.html" data-header-resume hidden>
            继续上一桌
          </a>
          <a class="header-join-link" href="#quickJoin">输入房间号</a>
          <button
            class="mobile-menu-button"
            type="button"
            aria-label="打开导航"
            aria-controls="mainNav"
            aria-expanded="false"
            data-menu-toggle
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
              <path d="M5 7.5h14M5 12h14M5 16.5h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </header>

      <main class="home-main">
        <section class="home-hero" aria-labelledby="heroTitle">
          <div class="hero-copy">
            <h1 id="heroTitle">朋友开局，<br>就差<em>你</em>了</h1>
            <p class="hero-description">不用下载，发个房间号就能一起玩。</p>

            <div class="hero-actions">
              <a
                class="primary-action"
                href="./games/zha-jin-hua.html?setup=1"
                data-start-game
              >
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" aria-hidden="true">
                  <path
                    d="M12 11.3c-1.1-3.8-2.5-5.4-4.5-5.4A3.2 3.2 0 0 0 4.3 9c0 2.2 1.8 3.4 4.6 2.9-3.3.8-4.6 2.2-4.2 4.2a3.2 3.2 0 0 0 3.7 2.5c2.1-.5 2.9-2.2 3.4-4.9.6 3.5 1.9 4.9 3.9 4.9a3.4 3.4 0 0 0 3.3-3.4c0-2.1-1.7-3.3-4.5-3.2 3.3-.7 4.7-2 4.4-4a3.2 3.2 0 0 0-3.7-2.8c-2 .3-2.9 2-3.2 6.1Z"
                    fill="currentColor"
                  />
                  <path d="M12 12.4c.1 4.1-.7 6.3-2.6 7.4h5.2c-1.9-1.1-2.7-3.3-2.6-7.4Z" fill="currentColor"/>
                </svg>
                开始炸金花
              </a>

              <form id="quickJoin" class="quick-join" data-quick-join novalidate>
                <div class="quick-join-field">
                  <label for="roomCode">房间号</label>
                  <input
                    id="roomCode"
                    name="room"
                    maxlength="8"
                    autocomplete="off"
                    autocapitalize="characters"
                    spellcheck="false"
                    inputmode="text"
                    placeholder="输入房间号"
                    aria-describedby="joinError"
                  >
                </div>
                <button class="join-button" type="submit" data-join-button>加入</button>
                <p id="joinError" class="join-error" role="alert" aria-live="polite"></p>
              </form>
            </div>
          </div>

          <figure class="hero-art">
            <div class="hero-art-frame" data-hero-frame>
              <img
                src="./design-assets/home-hero-friends-v1.webp"
                width="1600"
                height="900"
                alt="四位朋友在明亮客厅里围桌打牌"
                fetchpriority="high"
                decoding="async"
                data-hero-image
              >
            </div>
          </figure>
        </section>

        <section id="play" class="games-section" aria-labelledby="gamesTitle">
          <div class="section-heading">
            <h2 id="gamesTitle">今晚玩什么</h2>
            <p>炸金花已经可以开桌，更多朋友局正在慢慢加入。</p>
          </div>

          <div class="game-rail">
            <a
              class="game-card game-card-primary"
              href="./games/zha-jin-hua.html?setup=1"
              data-game-id="zha-jin-hua"
              data-status="available"
            >
              <div>
                <h3>炸金花</h3>
                <p>经典三张比牌，简单、直接，适合朋友随时开一桌。</p>
                <span class="card-action" aria-label="开始炸金花">
                  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
                    <path d="M6 12h12m-5-5 5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </div>
            </a>

            <article
              class="game-card game-card-small"
              data-game-id="party-cards"
              data-status="coming-soon"
              aria-disabled="true"
            >
              <div class="game-cover game-cover-party" role="img" aria-label="彩色派对牌插画"></div>
              <div class="game-card-meta">
                <h3>彩色派对牌</h3>
                <span class="coming-soon">敬请期待</span>
              </div>
            </article>

            <article
              class="game-card game-card-small"
              data-game-id="undercover"
              data-status="coming-soon"
              aria-disabled="true"
            >
              <div class="game-cover game-cover-undercover" role="img" aria-label="朋友推理游戏插画"></div>
              <div class="game-card-meta">
                <h3>谁是卧底</h3>
                <span class="coming-soon">敬请期待</span>
              </div>
            </article>

            <article
              class="game-card game-card-small"
              data-game-id="werewolf"
              data-status="coming-soon"
              aria-disabled="true"
            >
              <div class="game-cover game-cover-werewolf" role="img" aria-label="月夜朋友聚会插画"></div>
              <div class="game-card-meta">
                <h3>狼人杀</h3>
                <span class="coming-soon">敬请期待</span>
              </div>
            </article>
          </div>
        </section>

        <section id="rooms" class="resume-section" aria-labelledby="resumeTitle" data-resume-section>
          <div class="resume-copy">
            <h2 id="resumeTitle" data-resume-title>还没有进行中的房间</h2>
            <p data-resume-copy>先开一桌，之后临时退出也能从这里继续。</p>
          </div>
          <div class="resume-actions">
            <span class="resume-room" data-resume-room hidden></span>
            <a
              class="resume-button"
              href="./games/zha-jin-hua.html?setup=1"
              data-resume-action
            >
              开始一桌
            </a>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span>Table Any Where · 和朋友轻松开一桌</span>
        <nav aria-label="页脚导航">
          <a href="#play">一起玩</a>
          <a href="./games/zha-jin-hua.html">游戏说明</a>
        </nav>
      </footer>
    </div>
  </body>
</html>
